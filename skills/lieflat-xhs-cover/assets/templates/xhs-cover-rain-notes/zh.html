<script>
(() => {
  const canvas = document.getElementById("rain");
  const ctx = canvas.getContext("2d");
  const drops = Array.from({ length: 90 }, () => ({ x: 0, y: 0, l: 0, s: 0, o: 0 }));
  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    resetAll(rect.width, rect.height);
  }
  function reset(drop, w, h) {
    drop.x = Math.random() * w;
    drop.y = Math.random() * h;
    drop.l = 22 + Math.random() * 54;
    drop.s = 1.7 + Math.random() * 2.8;
    drop.o = 0.12 + Math.random() * 0.3;
  }
  function resetAll(w, h) { drops.forEach((d) => reset(d, w, h)); }
  function draw() {
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    ctx.strokeStyle = "rgba(44, 70, 87, 0.32)";
    ctx.lineWidth = 1;
    drops.forEach((drop) => {
      ctx.globalAlpha = drop.o;
      ctx.beginPath();
      ctx.moveTo(drop.x, drop.y);
      ctx.lineTo(drop.x - drop.l * 0.34, drop.y + drop.l);
      ctx.stroke();
      drop.x -= drop.s * 0.34;
      drop.y += drop.s;
      if (drop.y > rect.height + drop.l || drop.x < -drop.l) reset(drop, rect.width, rect.height);
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  window.addEventListener("resize", resize);
  resize();
  draw();
})();
</script>
