<main class="card" aria-label="Dot Matrix 封面">

<script>
const canvas = document.getElementById("field");
const ctx = canvas.getContext("2d");
let w = 0;
let h = 0;
let dpr = 1;

const palette = {
  base: [36, 34, 31],
  secondary: [120, 115, 106],
  tertiary: [142, 150, 148],
  glow: [58, 56, 51],
  paper: "#deded9",
};

function fitCanvas() {
  const rect = canvas.getBoundingClientRect();
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  w = Math.round(rect.width);
  h = Math.round(rect.height);
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function seeded(x, y) {
  const n = Math.sin(x * 41.13 + y * 97.77) * 43758.5453;
  return n - Math.floor(n);
}

function rgba(rgb, a) {
  return `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${a})`;
}

function drawBackground(t) {
  ctx.fillStyle = palette.paper;
  ctx.fillRect(0, 0, w, h);

  ctx.font = `${Math.max(7, w * 0.014)}px "PingFang SC", "Microsoft YaHei", sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  const chars = [".", "·", "+", "×", "%", "#"];
  const step = Math.max(18, w * 0.043);

  for (let y = step * 0.5; y < h; y += step) {
    for (let x = step * 0.5; x < w; x += step) {
      const r = seeded(Math.round(x), Math.round(y));
      const pulse = 0.52 + 0.48 * Math.sin(t * 0.001 + x * 0.011 + y * 0.004);
      const a = (0.018 + r * 0.025) * pulse;
      ctx.fillStyle = rgba(palette.base, a);
      ctx.fillText(chars[Math.floor(r * chars.length)], x, y);
    }
  }
}

function drawDotGlobe(cx, cy, r, rgb, rot, alpha = 1) {
  const step = Math.max(5, r / 22);
  const fontSize = Math.max(5, r / 21);
  const chars = ["#", "*", "×", "+", "·", "%"];
  ctx.font = `${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for (let sx = -r; sx <= r; sx += step) {
    for (let sy = -r; sy <= r; sy += step) {
      if (sx * sx + sy * sy > r * r) continue;
      const d = Math.hypot(sx, sy) / r;
      const wave = Math.sin((sx + rot * 140) * 0.065) + Math.cos((sy - rot * 90) * 0.055);
      const s = seeded(Math.round(sx * 4), Math.round(sy * 4));
      const land = wave + s * 1.2 > 0.92;
      const a = (land ? 0.7 : 0.28) * (1 - d * 0.18) * alpha;
      ctx.fillStyle = rgba(rgb, a);
      ctx.fillText(chars[Math.floor(s * chars.length)], cx + sx, cy + sy);
    }
  }
}

function drawOrbitSystem(t) {
  const cx = w * 0.7;
  const cy = h * 0.39;
  const scale = Math.min(w, h);
  const rot = t * 0.00032;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-0.28);

  const lanes = [
    { y: -scale * 0.16, width: scale * 0.7, bow: scale * 0.08 },
    { y: -scale * 0.02, width: scale * 0.86, bow: -scale * 0.05 },
    { y: scale * 0.12, width: scale * 0.76, bow: scale * 0.06 },
  ];

  lanes.forEach((lane, i) => {
    ctx.beginPath();
    ctx.moveTo(-lane.width * 0.5, lane.y);
    ctx.bezierCurveTo(-lane.width * 0.2, lane.y + lane.bow, lane.width * 0.2, lane.y - lane.bow, lane.width * 0.5, lane.y);
    ctx.strokeStyle = rgba(palette.base, 0.07 + i * 0.018);
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  for (let i = 0; i < 58; i++) {
    const lane = lanes[i % lanes.length];
    const p = (i * 0.618 + t * 0.00003) % 1;
    const x = (p - 0.5) * lane.width;
    const y = lane.y + Math.sin(p * Math.PI * 2 + i) * scale * 0.018 + Math.sin(p * Math.PI) * lane.bow * 0.55;
    const s = seeded(i * 11, Math.round(t * 0.02));
    ctx.fillStyle = rgba(s > 0.58 ? palette.glow : palette.secondary, 0.09 + s * 0.14);
    ctx.fillRect(x, y, Math.max(1, scale * 0.003), Math.max(1, scale * 0.003));
  }

  ctx.restore();

  const nodes = [
    [cx - scale * 0.22, cy - scale * 0.08, scale * 0.052, palette.secondary],
    [cx + scale * 0.02, cy - scale * 0.01, scale * 0.08, palette.base],
    [cx + scale * 0.25, cy + scale * 0.12, scale * 0.05, palette.tertiary],
    [cx - scale * 0.08, cy + scale * 0.24, scale * 0.044, palette.glow],
  ];

  ctx.beginPath();
  nodes.forEach((node, i) => {
    if (i === 0) ctx.moveTo(node[0], node[1]);
    else ctx.lineTo(node[0], node[1]);
  });
  ctx.strokeStyle = rgba(palette.base, 0.1);
  ctx.stroke();

  nodes.forEach((node, i) => {
    drawDotGlobe(node[0], node[1], node[2], node[3], rot * (i % 2 ? -1 : 1), 0.7);
    ctx.beginPath();
    ctx.arc(node[0], node[1], node[2] * 1.45, 0, Math.PI * 2);
    ctx.strokeStyle = rgba(palette.base, 0.075);
    ctx.lineWidth = 1;
    ctx.stroke();
  });
}

function draw(t) {
  drawBackground(t);
  drawOrbitSystem(t);
  requestAnimationFrame(draw);
}

window.addEventListener("resize", fitCanvas);
fitCanvas();
requestAnimationFrame(draw);
</script>
