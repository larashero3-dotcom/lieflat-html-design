.card {

  overflow: hidden;
  border: 1px solid var(--line-strong);
  border-radius: 8px;

  isolation: isolate;
}

/* The cover keeps the source deck's HUD grid and scan texture, but removes slide navigation. */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  opacity: 0.23;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
  background-size: 5px 5px, 11px 11px;
  mix-blend-mode: screen;
}

.frame {
  position: absolute;
  inset: 34px;
  z-index: 1;
  border: 1px solid var(--line);
}

.frame::before,
.frame::after {
  content: "";
  position: absolute;
  background: var(--line-strong);
}

.frame::before {
  left: 0;
  right: 0;
  top: 142px;
  height: 1px;
}

.frame::after {

.scan {
