<body>
<main class="card" aria-label="Sunrise Codex 测评封面">
  <canvas id="bg" aria-hidden="true"></canvas>
  <header class="mast"><span>使用手记</span><span>交付收尾</span></header>
  <section class="hero">
    <p class="label">AI 工作流观察</p>

</main>
<script>
(() => {
  const canvas = document.getElementById("bg");
  const gl = canvas.getContext("webgl", { antialias: true, alpha: false }) ||
    canvas.getContext("experimental-webgl", { antialias: true, alpha: false });

  if (!gl) {
    return;
  }

  const vs = `
    attribute vec2 a_pos;
    void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
  `;

  const fs = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;
    uniform vec3 u_c1, u_c2, u_bg;

    vec3 _m3(vec3 x){return x-floor(x*(1./289.))*289.;}
    vec4 _m4(vec4 x){return x-floor(x*(1./289.))*289.;}
    vec4 _p(vec4 x){return _m4(((x*34.)+1.)*x);}
    vec4 _ti(vec4 r){return 1.79284291400159-0.85373472095314*r;}

    float snoise(vec3 v){
      const vec2 C=vec2(1./6.,1./3.);
      const vec4 D=vec4(0.,.5,1.,2.);
      vec3 i=floor(v+dot(v,C.yyy));
      vec3 x0=v-i+dot(i,C.xxx);
      vec3 g=step(x0.yzx,x0.xyz),l=1.-g;
      vec3 i1=min(g.xyz,l.zxy),i2=max(g.xyz,l.zxy);
      vec3 x1=x0-i1+C.x,x2=x0-i2+C.y,x3=x0-D.y;
      i=_m3(i);
      vec4 p=_p(_p(_p(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
      float n_=.142857142857;
      vec3 ns=n_*D.wyz-D.xzx;
      vec4 j=p-49.*floor(p*ns.z*ns.z);
      vec4 x_=floor(j*ns.z),y_=floor(j-7.*x_);
      vec4 x=x_*ns.x+ns.yyyy,y=y_*ns.x+ns.yyyy;
      vec4 h=1.-abs(x)-abs(y);
      vec4 b0=vec4(x.xy,y.xy),b1=vec4(x.zw,y.zw);
      vec4 s0=floor(b0)*2.+1.,s1=floor(b1)*2.+1.;
      vec4 sh=-step(h,vec4(0.));
      vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy,a1=b1.xzyw+s1.xzyw*sh.zzww;
      vec3 p0=vec3(a0.xy,h.x),p1=vec3(a0.zw,h.y),p2=vec3(a1.xy,h.z),p3=vec3(a1.zw,h.w);
      vec4 nr=_ti(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
      p0*=nr.x;p1*=nr.y;p2*=nr.z;p3*=nr.w;
      vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
      m=m*m;
      return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
    }

    void main(){
      vec2 uv=gl_FragCoord.xy/u_res;
      uv.y=1.-uv.y;
      float n1=snoise(vec3(uv*1.7, u_time*.16));
      float n2=snoise(vec3(uv*3.3+1.7, u_time*.11+4.5));
      float n3=snoise(vec3(uv*6.8+3.2, u_time*.06+9.0));
      float b=clamp(n1*.55+n2*.28+n3*.17,-.99,.99)*.5+.5;
      float alpha=smoothstep(.32,.58,b);
      vec3 nc=mix(u_c1/255.,u_c2/255.,smoothstep(.30,.70,b));
      vec3 col=mix(u_bg/255.,nc,alpha*.30+.04);
      float vg=1.-.12*length((uv-.5)*vec2(1.4,.9));
      col*=vg;
      gl_FragColor=vec4(col,1.);
    }
  `;

  function shader(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    return sh;
  }

  const program = gl.createProgram();
  gl.attachShader(program, shader(gl.VERTEX_SHADER, vs));
  gl.attachShader(program, shader(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(program);
  gl.useProgram(program);

  const buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(program, "a_pos");
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uniforms = {
    res: gl.getUniformLocation(program, "u_res"),
    time: gl.getUniformLocation(program, "u_time"),
    c1: gl.getUniformLocation(program, "u_c1"),
    c2: gl.getUniformLocation(program, "u_c2"),
    bg: gl.getUniformLocation(program, "u_bg")
  };

  const c1 = [228, 175, 138];
  const c2 = [200, 152, 158];
  const bg = [236, 226, 216];

  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }

  const t0 = performance.now();
  function draw() {
    const t = (performance.now() - t0) / 1000;
    gl.uniform2f(uniforms.res, canvas.width, canvas.height);
    gl.uniform1f(uniforms.time, t);
    gl.uniform3fv(uniforms.c1, c1);
    gl.uniform3fv(uniforms.c2, c2);
    gl.uniform3fv(uniforms.bg, bg);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>
